<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Service Business Ideas - Research & Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fa;
  --card: #ffffff;
  --hover: #f0f4ff;
  --border: #e2e8f0;
  --accent: #4f46e5;
  --green: #059669;
  --yellow: #d97706;
  --red: #dc2626;
  --text: #1e293b;
  --muted: #64748b;
  --surface: #f1f5f9;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; font-size:13px; }
.wrap { max-width:1300px; margin:0 auto; padding:16px; }

header { padding:20px 0; border-bottom:2px solid var(--border); margin-bottom:14px; }
header h1 { font-size:1.5rem; font-weight:800; }
header p { color:var(--muted); font-size:0.85rem; margin-top:4px; }
.stats { display:flex; gap:12px; margin-top:10px; flex-wrap:wrap; }
.stat { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:6px 14px; }
.stat b { font-size:1.2rem; color:var(--accent); }
.stat small { display:block; font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }

.filters { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; align-items:end; padding:8px 12px; background:var(--card); border-radius:6px; border:1px solid var(--border); }
.fg { display:flex; flex-direction:column; gap:2px; }
.fg label { font-size:0.65rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; }
.fg select,.fg input { background:var(--surface); border:1px solid var(--border); padding:4px 8px; border-radius:4px; font-size:0.8rem; color:var(--text); }

/* Spreadsheet table */
.sheet { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.sheet thead th { background:var(--surface); padding:8px 10px; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); text-align:left; border-bottom:2px solid var(--border); white-space:nowrap; position:sticky; top:0; z-index:1; }
.sheet thead th.c { text-align:center; }
.sheet tbody tr { cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.1s; }
.sheet tbody tr:hover { background:var(--hover); }
.sheet tbody tr.active { background:#eef2ff; border-left:3px solid var(--accent); }
.sheet td { padding:8px 10px; font-size:0.82rem; vertical-align:middle; }
.sheet td.c { text-align:center; }
.sheet .title-col { font-weight:600; color:var(--text); max-width:280px; }
.sheet .title-col .sub { font-weight:400; color:var(--muted); font-size:0.72rem; display:block; }
.score-h { color:var(--green); font-weight:800; }
.score-m { color:var(--yellow); font-weight:800; }
.score-l { color:var(--red); font-weight:800; }
.badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:0.65rem; font-weight:600; }
.b-cat { background:#eef2ff; color:#4338ca; }
.b-v { background:#dcfce7; color:#166534; }
.b-pv { background:#fef9c3; color:#854d0e; }
.b-uv { background:#fee2e2; color:#991b1b; }
.b-na { background:#f1f5f9; color:#94a3b8; }
.spd-f { background:#dcfce7; color:#166534; padding:1px 6px; border-radius:8px; font-size:0.7rem; font-weight:600; }
.spd-m { background:#fef9c3; color:#854d0e; padding:1px 6px; border-radius:8px; font-size:0.7rem; font-weight:600; }
.spd-s { background:#fee2e2; color:#991b1b; padding:1px 6px; border-radius:8px; font-size:0.7rem; font-weight:600; }

/* Expanded detail row */
.detail-row { display:none; }
.detail-row.open { display:table-row; }
.detail-row td { padding:0 !important; background:var(--surface); }
.det { padding:16px 20px; }
.det-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:900px) { .det-grid { grid-template-columns:1fr; } }
.det-box { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px; }
.det-box h5 { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--accent); margin-bottom:6px; }
.det-box p { font-size:0.82rem; line-height:1.55; }

.pitch-box { background:#eff6ff; border:1px solid #bfdbfe; }
.pitch-box h5 { color:#1d4ed8 !important; }
.cole-box { background:#f5f3ff; border:1px solid #ddd6fe; margin-top:14px; border-radius:6px; padding:12px; }
.cole-box h5 { color:#7c3aed !important; font-size:0.75rem; text-transform:uppercase; margin-bottom:8px; }
.cole-box .fl { font-weight:700; color:#6d28d9; font-size:0.72rem; display:block; margin-top:8px; }
.cole-box p { font-size:0.8rem; }

.proof-note { padding:8px 12px; border-radius:4px; font-size:0.78rem; margin-bottom:10px; }
.pn-v { background:#f0fdf4; border:1px solid #86efac; color:#166534; }
.pn-pv { background:#fffbeb; border:1px solid #fde68a; color:#92400e; }
.pn-uv { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }

.ptags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.ptag { font-size:0.68rem; padding:2px 6px; border-radius:3px; background:#e0e7ff; color:#3730a3; font-weight:600; }

.metrics-row { display:flex; gap:8px; margin:10px 0; flex-wrap:wrap; }
.met { text-align:center; padding:4px 8px; background:var(--card); border:1px solid var(--border); border-radius:4px; }
.met b { font-size:0.85rem; }
.met small { font-size:0.6rem; color:var(--muted); display:block; text-transform:uppercase; }

.vlink { color:var(--accent); text-decoration:none; font-size:0.78rem; padding:3px 8px; background:#eef2ff; border-radius:3px; margin-top:8px; display:inline-block; }
.vlink:hover { background:#e0e7ff; }
.transcript-prev { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:8px; font-size:0.76rem; color:var(--muted); max-height:120px; overflow-y:auto; margin-top:6px; font-style:italic; }
.offer-note { margin-top:6px; padding:6px 10px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:4px; font-size:0.78rem; }

.empty { text-align:center; padding:40px; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>AI Service Business Ideas</h1>
    <p>83 proof-verified ideas with execution blueprints, Cole Gordon offer frameworks, pitch scripts, and platform specifics.</p>
    <div class="stats">
      <div class="stat"><b id="s-total">0</b><small>Ideas</small></div>
      <div class="stat"><b id="s-ver">0</b><small>Verified</small></div>
      <div class="stat"><b id="s-cat">0</b><small>Categories</small></div>
      <div class="stat"><b id="s-avg">0</b><small>Avg Score</small></div>
    </div>
  </header>

  <div class="filters">
    <div class="fg"><label>Category</label><select id="f-cat"><option value="all">All</option></select></div>
    <div class="fg"><label>Min Score</label><select id="f-sc"><option value="0">Any</option><option value="7">7+</option><option value="8">8+</option><option value="9">9+</option></select></div>
    <div class="fg"><label>Price</label><select id="f-pr"><option value="all">Any</option><option value="low">$100-500</option><option value="mid">$500-2K</option><option value="high">$2K-5K</option><option value="premium">$5K+</option></select></div>
    <div class="fg"><label>Speed to $5K</label><select id="f-sp"><option value="all">Any</option><option value="hours">Hours</option><option value="days">Days</option><option value="weeks">Weeks</option></select></div>
    <div class="fg"><label>Proof</label><select id="f-pf"><option value="all">Any</option><option value="verified">Verified</option><option value="partially-verified">Partial+</option></select></div>
    <div class="fg"><label>Sort By</label><select id="f-sort"><option value="score">Score</option><option value="speed">Speed</option><option value="price">Price High</option><option value="ease">Ease</option></select></div>
    <div class="fg"><label>Search</label><input id="f-q" placeholder="Search..." style="width:140px"></div>
  </div>

  <table class="sheet" id="tbl">
    <thead>
      <tr>
        <th style="width:30px" class="c">#</th>
        <th>Idea / Creator</th>
        <th class="c" style="width:50px">Score</th>
        <th style="width:120px">Category</th>
        <th style="width:120px">Price Point</th>
        <th class="c" style="width:70px">Speed</th>
        <th class="c" style="width:50px">Ease</th>
        <th class="c" style="width:55px">Demand</th>
        <th class="c" style="width:50px">AI %</th>
        <th class="c" style="width:80px">Proof</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
let D=[];
const sc=s=>s>=8?'score-h':s>=6?'score-m':'score-l';
const sp=s=>['minutes','hours'].includes(s)?'spd-f':['days','1-2 days'].includes(s)?'spd-m':'spd-s';
const pb=p=>({verified:'b-v','partially-verified':'b-pv',unverified:'b-uv'})[p]||'b-na';
const pbl=p=>({verified:'Verified','partially-verified':'Partial',unverified:'Unverified','n/a':'N/A'})[p]||'?';
const pnc=p=>p==='verified'?'pn-v':p==='unverified'?'pn-uv':'pn-pv';

function row(d,i,rank) {
  // Build expanded detail HTML
  let det = '';
  if(d.proofNote) det+=`<div class="proof-note ${pnc(d.proofLevel)}"><b>Evidence:</b> ${d.proofNote}</div>`;

  det+='<div class="det-grid">';

  // Left: execution
  det+='<div>';
  if(d.businessAnalysis) det+=`<div class="det-box"><h5>Business Model & Execution Plan</h5><p>${d.businessAnalysis}</p></div>`;
  if(d.automationPlan) det+=`<div class="det-box"><h5>How to Build It (Step by Step)</h5><p>${d.automationPlan}</p></div>`;
  if(d.toolsNeeded&&d.toolsNeeded.length) det+=`<div class="det-box"><h5>Platforms & Tools</h5><div class="ptags">${d.toolsNeeded.map(t=>`<span class="ptag">${t}</span>`).join('')}</div></div>`;
  if(d.unitEconomics) det+=`<div class="det-box"><h5>Unit Economics</h5><p>${d.unitEconomics}</p></div>`;
  det+='</div>';

  // Right: audience + pitch
  det+='<div>';
  if(d.audienceAcquisition) det+=`<div class="det-box pitch-box"><h5>Industry to Target & How to Pitch</h5><p>${d.audienceAcquisition}</p></div>`;
  if(d.whyValuable) det+=`<div class="det-box pitch-box"><h5>Why They Say Yes (Value Prop)</h5><p>${d.whyValuable}</p></div>`;
  if(d.offerDescription) det+=`<div class="offer-note"><b>Creator's Offer:</b> ${d.offerDescription}</div>`;
  det+='</div>';
  det+='</div>';

  // Cole Gordon
  const isB2C=(d.tags||[]).some(t=>t.includes('b2c')||t.includes('human-desire'));
  const isNiche=(d.tags||[]).some(t=>t.includes('niche')||t.includes('blue-ocean')||t.includes('vertical'));
  const isRedOcean=(d.tags||[]).some(t=>['voice-agent','chatbot','receptionist'].includes(t));

  det+=`<div class="cole-box"><h5>Cole Gordon Offer Framework</h5>
    <span class="fl">3S FORMULA: Specific Problem + Specific Person + Specific Way</span>
    <p>${d.summary}</p>
    <span class="fl">DESIRE TYPE</span>
    <p>${isB2C ? 'Below Average to Average (PAIN/URGENCY) - They feel behind and need to fix it NOW. High urgency = easier sale.' : (d.priceNumeric||0)>3000 ? 'Average to Excellence (ASPIRATION) - Business is running but wants to level up. Lower urgency, higher budgets.' : 'Below Average to Average (PAIN) - Business is losing measurable money/time. The math sells itself.'}</p>
    <span class="fl">GOLDEN OPPORTUNITY SEGMENT</span>
    <p>${isB2C ? '"Wealthy people who feel below average" = JACKPOT. Target high-income people experiencing this pain. High urgency + high ability to pay. Example: affluent divorced people, executives with health issues, high-earners job searching.' : isNiche ? '"Wealthy businesses who feel below average in this area." Business owners making $1M+ but losing money on [this specific problem]. They have budget AND urgency.' : 'Business owners already spending money on the problem (ads, staff, tools) but getting poor results. They have budget - redirect their existing spend to you.'}</p>
    <span class="fl">BARBELL POSITION</span>
    <p>${(d.priceNumeric||0)>=5000 ? 'B2B / Done-For-You end of the barbell. High-touch, high-ticket. Small client count, big revenue per client.' : (d.priceNumeric||0)<=100 ? 'B2C / Mass market end. Low-touch, low-ticket. Needs volume to work. Subscription model.' : 'Middle zone - be careful. Cole says avoid no-mans-land. Either go higher-ticket DFY or lower-ticket self-serve. Dont get stuck in between.'}</p>
    <span class="fl">COMMODITIZATION RISK</span>
    <p>${isRedOcean ? 'HIGH - This space is crowded. Every AI agency offers this. You MUST differentiate through: vertical specialization, outcome-based pricing, or proprietary process naming (Cole says: name your method something nobody else calls it).' : isNiche ? 'LOW - Vertical focus creates natural differentiation. The more specific your niche, the harder to commoditize.' : 'MEDIUM - Growing market with room. Get in now with specific positioning before it crowds.'}</p>
    <span class="fl">MECHANISM (Most people... Problem is... Instead we...)</span>
    <p>Most people trying to solve [${d.category.toLowerCase()}] for businesses use generic tools and charge hourly. The problem is that creates a commodity. Instead, we built a specific ${d.title.split('(')[0].trim()} system that delivers [measurable outcome] in [timeframe] using [your named method].</p>
  </div>`;

  // Metrics
  det+=`<div class="metrics-row">
    <div class="met"><b class="${sc(d.easeOfDelivery)}">${d.easeOfDelivery}/10</b><small>Ease</small></div>
    <div class="met"><b class="${sc(d.marketDemand)}">${d.marketDemand}/10</b><small>Demand</small></div>
    <div class="met"><b class="${sc(d.aiAutomation)}">${d.aiAutomation}/10</b><small>AI%</small></div>
    <div class="met"><b class="${sc(d.profitability)}">${d.profitability}/10</b><small>Profit</small></div>
  </div>`;

  if(d.transcriptPreview) det+=`<div class="transcript-prev">"${d.transcriptPreview}"</div>`;
  if(d.videoUrl) det+=`<a class="vlink" href="${d.videoUrl}" target="_blank">Watch Video</a> `;
  if(d.creatorSite) det+=`<a class="vlink" href="${d.creatorSite}" target="_blank">Creator Site</a>`;

  return `<tr class="drow" onclick="tog(${i})">
    <td class="c" style="color:var(--muted);font-weight:600">${rank}</td>
    <td class="title-col">${d.title}<span class="sub">${d.creator}</span></td>
    <td class="c ${sc(d.overallScore)}" style="font-weight:800;font-size:0.95rem">${d.overallScore}</td>
    <td><span class="badge b-cat">${d.category}</span></td>
    <td style="font-weight:600">${d.pricePoint}</td>
    <td class="c"><span class="${sp(d.speedToFirst5k)}">${d.speedToFirst5k}</span></td>
    <td class="c ${sc(d.easeOfDelivery)}" style="font-weight:700">${d.easeOfDelivery}</td>
    <td class="c ${sc(d.marketDemand)}" style="font-weight:700">${d.marketDemand}</td>
    <td class="c ${sc(d.aiAutomation)}" style="font-weight:700">${d.aiAutomation}</td>
    <td class="c"><span class="badge ${pb(d.proofLevel)}">${pbl(d.proofLevel)}</span></td>
  </tr>
  <tr class="detail-row" id="dr${i}"><td colspan="10"><div class="det">${det}</div></td></tr>`;
}

function tog(i){document.getElementById('dr'+i).classList.toggle('open');document.querySelectorAll('.drow')[i]?.classList.toggle('active');}

function render(){
  const tb=document.getElementById('tbody');
  const cv=document.getElementById('f-cat').value;
  const sv=+document.getElementById('f-sc').value;
  const pv=document.getElementById('f-pr').value;
  const spv=document.getElementById('f-sp').value;
  const pfv=document.getElementById('f-pf').value;
  const srt=document.getElementById('f-sort').value;
  const q=document.getElementById('f-q').value.toLowerCase();

  let f=D.filter(d=>{
    if(cv!=='all'&&d.category!==cv)return false;
    if(d.overallScore<sv)return false;
    if(pv!=='all'&&d.priceRange!==pv)return false;
    if(spv!=='all'&&!d.speedToFirst5k.toLowerCase().includes(spv))return false;
    if(pfv==='verified'&&d.proofLevel!=='verified')return false;
    if(pfv==='partially-verified'&&d.proofLevel==='unverified')return false;
    if(q&&!JSON.stringify(d).toLowerCase().includes(q))return false;
    return true;
  });

  const sf={score:(a,b)=>b.overallScore-a.overallScore,speed:(a,b)=>{const o={minutes:0,hours:1,days:2,'1-2 days':2,weeks:3,months:4};return(o[a.speedToFirst5k]||5)-(o[b.speedToFirst5k]||5);},price:(a,b)=>(b.priceNumeric||0)-(a.priceNumeric||0),ease:(a,b)=>b.easeOfDelivery-a.easeOfDelivery};
  f.sort(sf[srt]||sf.score);

  tb.innerHTML=f.length?f.map((d,i)=>row(d,i,i+1)).join(''):'<tr><td colspan="10" class="empty">No matching ideas. Adjust filters.</td></tr>';

  const cats=[...new Set(D.map(d=>d.category))].sort();
  document.getElementById('s-total').textContent=D.length;
  document.getElementById('s-ver').textContent=D.filter(d=>d.proofLevel==='verified').length;
  document.getElementById('s-cat').textContent=cats.length;
  document.getElementById('s-avg').textContent=D.length?(D.reduce((a,b)=>a+b.overallScore,0)/D.length).toFixed(1):'0';
  const cs=document.getElementById('f-cat'),cur=cs.value;
  cs.innerHTML='<option value="all">All</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  cs.value=cur;
}

['f-cat','f-sc','f-pr','f-sp','f-sort','f-pf'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('f-q').addEventListener('input',render);

const s=document.createElement('script');s.src='data.js';
s.onload=()=>{if(typeof BATCH_DATA!=='undefined'){D=BATCH_DATA;render();}};
document.head.appendChild(s);
</script>
</body>
</html>
